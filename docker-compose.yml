services:
  postgres:
    image: postgres:16-alpine
    container_name: ecac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecac_automacao
      POSTGRES_USER: ecac
      POSTGRES_PASSWORD: ecac
    ports:
      - "5432:5432"
    volumes:
      - ecac_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecac -d ecac_automacao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecac-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ecac_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ecac_postgres_data:
  ecac_redis_data:
